<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>ITMD Document</title>
</head>
<body>
  <h1>Volunteer Form</h1>
  <form action="https://nanosite0.github.io/webdev_lab5/lab5formscript.php" method="post">
    <fieldset>
      <legend>Info:</legend>
      <div><label>First Name: <input type="text" name="first_name_field"></label></div>
      <div><label>Last Name: <input type="text" name="last_name_field"></label></div>
      <div><label>Phone Number: <input type="text" name="phone_field" placeholder="1-555-555-5555"></label></div>
      <div><label>Email Address: <input type="text" name="email_field" placeholder="adress@email.com"></label></div>
      <div><strong>Gender:</strong></div>
      <div>
        <label>Male <input type="radio" name="gender_field"></label>
        <label>Female <input type="radio" name="gender_field"></label>
        <label>Non-Binary <input type="radio" name="gender_field"></label>
        <label>Prefer Not To Say <input type="radio" name="gender_field"></label>
        <label>Other: <input type="text" name="gender_field"></label>
      </div>
      <div>Age:</div>
      <select name="age_field">
        <option value="under_18">Under 18</option>
        <option value="over_18">Over 18</option>
      </select>
    </fieldset>
    <fieldset>
      <legend>Availability:</legend>
      <h3>Available Days:</h3>
      <div><label>Monday <input type="checkbox" name="available_field[]" value="monday"></label></div>
      <div><label>Tuesday <input type="checkbox" name="available_field[]" value="tuesday"></label></div>
      <div><label>Wednesday <input type="checkbox" name="available_field[]" value="wednesday"></label></div>
      <div><label>Thursday <input type="checkbox" name="available_field[]" value="thursday"></label></div>
      <div><label>Friday <input type="checkbox" name="available_field[]" value="friday"></label></div>
      <div><label>Saturday <input type="checkbox" name="available_field[]" value="saturday"></label></div>
      <div><label>Sunday <input type="checkbox" name="available_field[]" value="sunday"></label></div>
      <h3>Comments:</h3>
      <textarea rows="5" cols="40" name="comments_field" placeholder="enter any other comments you have here"></textarea>
    </fieldset>
    <input type="hidden" name="hidden_field" value="lmontoya">
    <input type="submit" value="Submit My Response!">
  </form>
</body>
</html>
